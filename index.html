<style>
/* ─────────────────────── VICTOR CI TOKENS ─────────────────────── */
:root {
  --blue: #0B308E;
  --orange: #EC6C00;
  --navy: #0a1929;
  --blue-bright: #2148b5;
  --blue-light: #e8edf7;
  --white: #ffffff;
  --gray50: #fafafa;
  --gray100: #f5f5f5;
  --gray200: #eeeeee;
  --gray300: #e0e0e0;
  --gray500: #9e9e9e;
  --gray700: #616161;
  --gray900: #212121;
  --red: #d32f2f;
  --green: #2e7d32;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans TC', sans-serif; background:var(--gray50); color:var(--gray900); -webkit-font-smoothing:antialiased; }
button { font-family:inherit; cursor:pointer; }
input { font-family:inherit; }

/* ─────────────────────── BANNER ──────────────────────────────── */
.banner { width:100%; overflow:hidden; }
.banner svg { width:100%; display:block; }

/* ─────────────────────── CARDS ──────────────────────────────── */
.card { background:var(--white); border-radius:20px; margin:16px; box-shadow:0 2px 16px rgba(11,48,142,0.08); overflow:hidden; }
.card-pad { padding:20px; }
.section-label { display:flex; align-items:center; gap:8px; font-size:15px; font-weight:700; color:var(--navy); }
.section-label span:first-child { font-size:18px; }
.divider { height:1px; background:var(--gray200); margin:0 20px; }

/* ─────────────────────── REP SELECT ─────────────────────────── */
.rep-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }
.rep-btn { padding:14px 8px; border:2px solid var(--gray200); border-radius:12px; background:var(--white); font-size:15px; font-weight:500; color:var(--navy); transition:all 0.2s; }
.rep-btn:hover { border-color:var(--blue); background:var(--blue-light); }

/* ─────────────────────── FORM PAGE ──────────────────────────── */
.sticky-header { background:var(--navy); padding:16px 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100; }
.sticky-header h2 { color:var(--white); font-size:17px; font-weight:700; margin:0; }
.sticky-header small { color:rgba(255,255,255,0.6); font-size:12px; }
.back-btn { background:none; border:none; color:var(--white); font-size:22px; padding:4px; }

.summary-bar { background:var(--white); padding:14px 20px; display:flex; justify-content:space-around; border-bottom:2px solid var(--gray200); position:sticky; top:62px; z-index:99; }
.stat-badge { text-align:center; }
.stat-badge .num { font-size:22px; font-weight:900; font-variant-numeric:tabular-nums; }
.stat-badge .label { font-size:11px; color:var(--gray500); margin-top:2px; }

/* ─────────────────────── DEALER CARD ────────────────────────── */
.dealer-card { background:var(--white); border-radius:16px; padding:16px; margin-bottom:12px; border:1px solid var(--gray200); transition:all 0.2s; }
.dealer-card.active { border:2px solid var(--blue-bright); box-shadow:0 2px 12px rgba(11,48,142,0.12); }
.dealer-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.dealer-name { font-size:16px; font-weight:700; color:var(--navy); }
.grade-tag { font-size:11px; padding:2px 8px; border-radius:100px; font-weight:500; display:inline-block; margin-left:8px; }
.grade-concept { background:#e8eaf6; color:#283593; }
.grade-sa { background:#fce4ec; color:#c62828; }
.grade-a { background:#fff3e0; color:#e65100; }
.grade-normal { background:var(--gray100); color:var(--gray700); }
.registered-badge { background:var(--blue-light); color:var(--blue); font-size:12px; font-weight:700; padding:4px 10px; border-radius:100px; }

.num-inputs { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.num-inputs-wide { display:grid; grid-template-columns:1fr; gap:10px; margin-bottom:10px; }
.num-input-label { font-size:11px; color:var(--gray500); margin-bottom:4px; text-align:center; }
.num-input-wrap { display:flex; align-items:center; border:1px solid var(--gray200); border-radius:8px; overflow:hidden; }
.num-input-wrap button { width:34px; height:38px; border:none; background:var(--gray100); font-size:18px; color:var(--gray700); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.num-input-wrap button.plus { color:var(--blue); }
.num-input-wrap .val { flex:1; text-align:center; font-size:16px; font-weight:700; color:var(--navy); width:40px; border:none; background:transparent; outline:none; font-family:inherit; -moz-appearance:textfield; }
.num-input-wrap .val::-webkit-outer-spin-button,
.num-input-wrap .val::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }

.kids-section { background:var(--gray50); border:1px solid var(--gray200); border-radius:10px; padding:10px 12px; margin-bottom:10px; }
.kids-section-title { font-size:12px; font-weight:600; color:var(--navy); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.kids-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.kids-note { font-size:10px; color:var(--gray500); margin-top:8px; text-align:center; }

.warning-box { background:#fff8e1; border:1px solid #ffe082; border-radius:8px; padding:8px 12px; font-size:12px; color:#f57f17; margin-bottom:10px; }
.note-input { width:100%; padding:10px 12px; border:1px solid var(--gray200); border-radius:8px; font-size:13px; color:var(--gray700); outline:none; }
.note-input:focus { border-color:var(--blue); }

/* ─────────────────────── SUBMIT FOOTER ──────────────────────── */
.submit-footer { position:fixed; bottom:0; left:0; right:0; padding:12px 16px; background:var(--white); border-top:1px solid var(--gray200); box-shadow:0 -4px 16px rgba(0,0,0,0.08); }
.submit-btn { width:100%; padding:14px; background:var(--blue); color:var(--white); border:none; border-radius:12px; font-size:16px; font-weight:700; }
.submit-btn:disabled { opacity:0.5; }

/* ─────────────────────── ADMIN ──────────────────────────────── */
.admin-btn { background:var(--white); border:1px solid var(--gray300); color:var(--gray700); padding:12px 32px; border-radius:12px; font-size:14px; box-shadow:0 1px 4px rgba(0,0,0,0.06); transition:all 0.2s; }
.admin-btn:hover { background:var(--blue-light); border-color:var(--blue); }
.admin-total { background:linear-gradient(135deg, var(--blue), var(--navy)); margin:16px; border-radius:20px; padding:20px; color:var(--white); }
.filter-chip { padding:6px 14px; border-radius:100px; font-size:12px; border:1px solid var(--gray300); background:var(--white); color:var(--gray700); transition:all 0.15s; }
.filter-chip.active { background:var(--navy); color:var(--white); border-color:var(--navy); font-weight:600; }
table { width:100%; border-collapse:collapse; font-size:12px; }
th { padding:10px 8px; text-align:center; font-size:12px; font-weight:600; color:var(--gray700); white-space:nowrap; background:var(--gray50); }
td { padding:10px 8px; text-align:center; white-space:nowrap; }

/* ─────────────────────── TOAST ──────────────────────────────── */
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:9999; background:var(--green); color:var(--white); padding:12px 28px; border-radius:12px; font-size:15px; font-weight:500; box-shadow:0 8px 32px rgba(0,0,0,0.2); animation:slideDown 0.3s ease; }
@keyframes slideDown { from { opacity:0; transform:translateX(-50%) translateY(-20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

/* ─────────────────────── LOADING ────────────────────────────── */
.loading-screen { display:flex; align-items:center; justify-content:center; height:100vh; background:var(--blue); color:var(--white); }
.spinner { width:32px; height:32px; border:3px solid rgba(255,255,255,0.2); border-top-color:var(--orange); border-radius:50%; animation:spin 0.8s linear infinite; margin:16px auto 0; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ─────────────────────── CONFIG MODAL ───────────────────────── */
.config-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; }
.config-box { background:var(--white); border-radius:20px; padding:32px 24px; max-width:440px; width:100%; }
.config-input { width:100%; padding:12px; border:2px solid var(--gray200); border-radius:10px; font-size:14px; margin:12px 0; font-family:monospace; }
.config-input:focus { border-color:var(--blue); outline:none; }
.config-save { width:100%; padding:14px; background:var(--blue); color:var(--white); border:none; border-radius:12px; font-size:16px; font-weight:700; margin-top:8px; }
</style>

// ── State ─────────────────────────────────────────────────────
let state = { view:"landing", rep:null, records:{}, loading:true, toast:null, filterRep:"all" };

// ── API Helpers ───────────────────────────────────────────────
async function apiLoad() {
  if (!API_URL) return {};
  try {
    const res = await fetch(API_URL + "?action=load");
    const data = await res.json();
    return data.records || {};
  } catch(e) { console.error("Load error:", e); return {}; }
}

async function apiSave(dealer, record) {
  if (!API_URL) return;
  try {
    await fetch(API_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body: JSON.stringify({
        action:"save",
        code: dealer.code,
        name: dealer.name,
        grade: dealer.grade,
        rep: dealer.rep,
        subsidy: SUBSIDY[dealer.grade] || 2,
        adults: record.adults || 0,
        kidA: record.kidA || 0,
        kidB: record.kidB || 0,
        kidC: record.kidC || 0,
        shuttle: record.shuttle || 0,
        note: record.note || "",
        updatedBy: state.rep?.name || ""
      })
    });
  } catch(e) { console.error("Save error:", e); }
}

async function apiReset() {
  if (!API_URL) return;
  try { await fetch(API_URL, { method:"POST", headers:{"Content-Type":"text/plain"}, body:JSON.stringify({action:"reset"}) }); } catch(e) { console.error(e); }
}

// ── Render Engine ─────────────────────────────────────────────
const $ = (sel) => document.querySelector(sel);
const app = () => document.getElementById("app");

function render() {
  if (state.loading) { app().innerHTML = renderLoading(); return; }
  if (!API_URL) { app().innerHTML = renderConfig(); return; }
  switch(state.view) {
    case "landing": app().innerHTML = renderLanding(); bindLanding(); break;
    case "form": app().innerHTML = renderForm(); bindForm(); break;
    case "admin": app().innerHTML = renderAdmin(); bindAdmin(); break;
  }
  if (state.toast) showToastEl(state.toast);
}

// ── Loading Screen ────────────────────────────────────────────

  return `<div class="loading-screen"><div style="text-align:center">

}

      <!-- Center content area -->
      <!-- Slogan -->

function bindLanding() {
  document.querySelectorAll('.rep-btn').forEach(btn => {
    btn.onclick = () => { state.rep = REPS.find(r=>r.id===btn.dataset.rep); state.view="form"; render(); };
  });
  $('#adminBtn').onclick = () => { state.view="admin"; render(); };
  $('#configBtn').onclick = () => { API_URL=""; render(); };
}

// ── Form Page ─────────────────────────────────────────────────
function renderForm() {
  const dealers = DEALERS.filter(d=>d.rep===state.rep.name).sort((a,b)=>GRADES.indexOf(a.grade)-GRADES.indexOf(b.grade) || a.code.localeCompare(b.code));
  const totals = dealers.reduce((a,d)=>{ const r=getRec(d.code); const kids=totalKids(r); return { adults:a.adults+(r.adults||0), kids:a.kids+kids, shuttle:a.shuttle+(r.shuttle||0), reg:a.reg+((r.adults||0)+kids>0?1:0) }; }, {adults:0,kids:0,shuttle:0,reg:0});

  return `<div style="min-height:100vh;background:var(--gray50)">
    <div class="sticky-header"><button class="back-btn" id="backBtn">←</button><div><h2>${state.rep.name} 的經銷商</h2><small>${dealers.length} 家經銷商</small></div></div>
    <div class="summary-bar">
      <div class="stat-badge"><div class="num" style="color:var(--blue)">${totals.reg}<span style="font-size:13px;font-weight:400;color:var(--gray500)">/${dealers.length}</span></div><div class="label">已登記</div></div>
      <div class="stat-badge"><div class="num" style="color:var(--orange)">${totals.adults}</div><div class="label">大人</div></div>
      <div class="stat-badge"><div class="num" style="color:#ffc107">${totals.kids}</div><div class="label">小孩</div></div>
      <div class="stat-badge"><div class="num" style="color:var(--green)">${totals.shuttle}</div><div class="label">接駁車</div></div>
    </div>
    <div style="padding:12px 16px 80px">${dealers.map(d=>renderDealerCard(d)).join('')}</div>
    <div class="submit-footer"><button class="submit-btn" id="refreshBtn">🔄 重新載入最新資料</button></div>
  </div>`;
}

function renderDealerCard(d) {
  const r = getRec(d.code); const sub = SUBSIDY[d.grade]||2; const kids = totalKids(r); const total = (r.adults||0)+kids; const over = total>sub;
  return `<div class="dealer-card ${total>0?'active':''}" id="dc-${d.code}">
    <div class="dealer-header"><div>
      <span class="dealer-name">${d.name}</span><span class="grade-tag ${GRADE_CLASS[d.grade]}">${d.grade}</span>
      <div style="font-size:12px;color:var(--gray500);margin-top:4px">${d.code}　補助 ${sub} 人</div>
    </div>${total>0?'<span class="registered-badge">已登記</span>':''}</div>
    <div class="num-inputs">
      ${numInput(d.code,"adults","🧑 大人（含140cm↑）",r.adults||0)}
      ${numInput(d.code,"shuttle","🚌 接駁車",r.shuttle||0)}
    </div>
    <div class="kids-section">
      <div class="kids-section-title">👶 小孩用餐（共 ${kids} 位）</div>
      <div class="kids-grid">
        ${numInput(d.code,"kidA","80cm以下",r.kidA||0)}
        ${numInput(d.code,"kidB","80-100cm",r.kidB||0)}
        ${numInput(d.code,"kidC","100-140cm",r.kidC||0)}
      </div>
      <div class="kids-note">⚠️ 140cm 以上請以「大人」計算</div>
    </div>
    ${over?`<div class="warning-box">⚠️ 超出補助 ${total-sub} 人，需補差額</div>`:''}
    <input class="note-input" data-code="${d.code}" data-field="note" placeholder="備註（素食、自費、其他...）" value="${r.note||''}">
  </div>`;
}

function numInput(code, field, label, val) {
  return `<div><div class="num-input-label">${label}</div><div class="num-input-wrap">
    <button data-code="${code}" data-field="${field}" data-delta="-1">−</button>
    <input type="number" class="val num-direct" data-code="${code}" data-field="${field}" value="${val}" min="0" max="99">
    <button class="plus" data-code="${code}" data-field="${field}" data-delta="1">+</button>
  </div></div>`;
}

function bindForm() {
  $('#backBtn').onclick = () => { state.view="landing"; render(); };
  $('#refreshBtn').onclick = async () => { state.loading=true; render(); state.records=await apiLoad(); state.loading=false; render(); };
  // +/- buttons
  document.querySelectorAll('.num-input-wrap button').forEach(btn => {
    btn.onclick = async () => {
      const {code,field,delta} = btn.dataset;
      if (!delta) return;
      const rec = getRec(code);
      rec[field] = Math.max(0, (rec[field]||0) + Number(delta));
      state.records[code] = rec;
      const dealer = DEALERS.find(d=>d.code===code);
      await apiSave(dealer, rec);
      render();
    };
  });
  // Direct number input
  document.querySelectorAll('.num-direct').forEach(inp => {
    let timer;
    inp.onfocus = () => inp.select();
    inp.oninput = () => {
      clearTimeout(timer);
      const {code,field} = inp.dataset;
      const rec = getRec(code);
      const val = parseInt(inp.value) || 0;
      rec[field] = Math.max(0, Math.min(99, val));
      state.records[code] = rec;
      timer = setTimeout(async () => {
        const dealer = DEALERS.find(d=>d.code===code);
        await apiSave(dealer, rec);
        render();
      }, 600);
    };
  });
  // Note input
  document.querySelectorAll('.note-input').forEach(inp => {
    let timer;
    inp.oninput = () => {
      clearTimeout(timer);
      const code = inp.dataset.code;
      const rec = getRec(code);
      rec.note = inp.value;
      state.records[code] = rec;
      timer = setTimeout(async () => {
        const dealer = DEALERS.find(d=>d.code===code);
        await apiSave(dealer, rec);
      }, 800);
    };
  });
}

// ── Admin Page ────────────────────────────────────────────────
function renderAdmin() {
  const repStats = REPS.map(rep => {
    const ds = DEALERS.filter(d=>d.rep===rep.name);
    return ds.reduce((a,d)=>{ const r=getRec(d.code); const kids=totalKids(r); const t=(r.adults||0)+kids; return {...a, adults:a.adults+(r.adults||0), kids:a.kids+kids, kidA:a.kidA+(r.kidA||0), kidB:a.kidB+(r.kidB||0), kidC:a.kidC+(r.kidC||0), shuttle:a.shuttle+(r.shuttle||0), reg:a.reg+(t>0?1:0) }; }, {name:rep.name, adults:0, kids:0, kidA:0, kidB:0, kidC:0, shuttle:0, reg:0, total:ds.length});
  });
  const grand = repStats.reduce((a,s)=>({total:a.total+s.adults+s.kids, adults:a.adults+s.adults, kids:a.kids+s.kids, kidA:a.kidA+s.kidA, kidB:a.kidB+s.kidB, kidC:a.kidC+s.kidC, shuttle:a.shuttle+s.shuttle, reg:a.reg+s.reg, dealers:a.dealers+s.total}), {total:0,adults:0,kids:0,kidA:0,kidB:0,kidC:0,shuttle:0,reg:0,dealers:0});

  const filtered = (state.filterRep==="all"?DEALERS:DEALERS.filter(d=>d.rep===state.filterRep)).sort((a,b)=>GRADES.indexOf(a.grade)-GRADES.indexOf(b.grade)||a.code.localeCompare(b.code));

  return `<div style="min-height:100vh;background:var(--gray50)">
    <div class="sticky-header" style="justify-content:space-between">
      <div style="display:flex;align-items:center;gap:12px"><button class="back-btn" id="backBtn">←</button><div><h2>管理後台</h2><small>${EVENT.season} 展示會</small></div></div>
      <div style="display:flex;gap:8px">
        <button id="refreshAdmin" style="background:var(--blue-bright);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px">🔄</button>
        <button id="exportBtn" style="background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500">📥 匯出</button>
      </div>
    </div>
    <div class="admin-total">
      <div style="font-size:13px;opacity:.7;margin-bottom:12px">全部登記總覽</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center">
        <div><div style="font-size:28px;font-weight:900">${grand.total}</div><div style="font-size:11px;opacity:.7">用餐總人數</div></div>
        <div><div style="font-size:28px;font-weight:900">${grand.adults}</div><div style="font-size:11px;opacity:.7">大人</div></div>
        <div><div style="font-size:28px;font-weight:900">${grand.shuttle}</div><div style="font-size:11px;opacity:.7">接駁車</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.15)">
        <div><div style="font-size:20px;font-weight:700">${grand.kidA}</div><div style="font-size:10px;opacity:.6">80cm以下</div></div>
        <div><div style="font-size:20px;font-weight:700">${grand.kidB}</div><div style="font-size:10px;opacity:.6">80-100cm</div></div>
        <div><div style="font-size:20px;font-weight:700">${grand.kidC}</div><div style="font-size:10px;opacity:.6">100-140cm</div></div>
      </div>
      <div style="margin-top:12px;font-size:12px;opacity:.6;text-align:center">已登記 ${grand.reg}/${grand.dealers} 家（${grand.dealers>0?Math.round(grand.reg/grand.dealers*100):0}%）</div>
    </div>
    <div class="card"><div style="padding:14px 16px;border-bottom:1px solid var(--gray200)"><span style="font-weight:700;color:var(--navy);font-size:15px">各業務統計</span></div>
    <div style="overflow-x:auto"><table><thead><tr><th>業務</th><th>登記</th><th>大人</th><th style="font-size:10px">80↓</th><th style="font-size:10px">80-100</th><th style="font-size:10px">100-140</th><th>接駁</th></tr></thead><tbody>
    ${repStats.map(s=>`<tr style="border-bottom:1px solid var(--gray100)"><td style="font-weight:600">${s.name}</td><td>${s.reg}/${s.total}</td><td>${s.adults}</td><td>${s.kidA}</td><td>${s.kidB}</td><td>${s.kidC}</td><td>${s.shuttle}</td></tr>`).join('')}
    </tbody></table></div></div>
    <div style="margin:0 16px 12px;display:flex;gap:6px;flex-wrap:wrap">
      <button class="filter-chip ${state.filterRep==='all'?'active':''}" data-filter="all">全部</button>
      ${REPS.map(r=>`<button class="filter-chip ${state.filterRep===r.name?'active':''}" data-filter="${r.name}">${r.name}</button>`).join('')}
    </div>
    <div class="card" style="margin-bottom:40px"><div style="overflow-x:auto"><table><thead><tr><th>編號</th><th>客戶</th><th>級別</th><th>業務</th><th>補助</th><th>大人</th><th style="font-size:10px">80↓</th><th style="font-size:10px">80-100</th><th style="font-size:10px">100-140</th><th>接駁</th><th>備註</th></tr></thead><tbody>
    ${filtered.map(d=>{ const r=getRec(d.code); const kids=totalKids(r); const t=(r.adults||0)+kids; const sub=SUBSIDY[d.grade]||2; const over=t>sub;
      return `<tr style="border-bottom:1px solid var(--gray100);background:${t>0?'#f8fbff':'transparent'}">
        <td style="font-size:11px">${d.code}</td><td style="font-weight:${t>0?600:400}">${d.name}</td><td style="font-size:11px">${d.grade}</td><td style="font-size:11px">${d.rep}</td><td>${sub}</td>
        <td style="font-weight:700;color:${(r.adults||0)>0?'var(--blue)':'var(--gray300)'}">${r.adults||0}</td>
        <td style="color:${(r.kidA||0)>0?'var(--orange)':'var(--gray300)'}">${r.kidA||0}</td>
        <td style="color:${(r.kidB||0)>0?'var(--orange)':'var(--gray300)'}">${r.kidB||0}</td>
        <td style="color:${(r.kidC||0)>0?'var(--orange)':'var(--gray300)'}">${r.kidC||0}</td>
        <td style="color:${(r.shuttle||0)>0?'var(--green)':'var(--gray300)'}">${r.shuttle||0}</td>
        <td style="font-size:11px;color:${over?'var(--red)':'var(--gray500)'}; max-width:100px;overflow:hidden;text-overflow:ellipsis">${over?'⚠️超額 ':''}${r.note||''}</td></tr>`;
    }).join('')}
    </tbody></table></div></div>
  </div>`;
}

function bindAdmin() {
  $('#backBtn').onclick = () => { state.view="landing"; render(); };
  $('#refreshAdmin').onclick = async () => { state.loading=true; render(); state.records=await apiLoad(); state.loading=false; state.view="admin"; render(); };
  $('#exportBtn').onclick = exportCSV;
  document.querySelectorAll('.filter-chip').forEach(c => {
    c.onclick = () => { state.filterRep = c.dataset.filter; render(); };
  });
}

function exportCSV() {
  const BOM="\uFEFF";
  const header="客戶編號,客戶簡稱,店級別,業務姓名,補助人數,大人,小孩80cm以下,小孩80-100cm,小孩100-140cm,小孩合計,接駁車人數,備註\n";
  const rows=DEALERS.map(d=>{ const r=getRec(d.code); const sub=SUBSIDY[d.grade]||2; const kids=totalKids(r);
    return `${d.code},${d.name},${d.grade},${d.rep},${sub},${r.adults||0},${r.kidA||0},${r.kidB||0},${r.kidC||0},${kids},${r.shuttle||0},"${(r.note||'').replace(/"/g,'""')}"`;
  }).join("\n");
  const blob=new Blob([BOM+header+rows],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`VICTOR_${EVENT.season}_展示會登記_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
}

// ── Helpers ───────────────────────────────────────────────────
function getRec(code) { return state.records[code] || {adults:0,kidA:0,kidB:0,kidC:0,shuttle:0,note:""}; }
function totalKids(r) { return (r.kidA||0)+(r.kidB||0)+(r.kidC||0); }

function showToastEl(msg) {
  const el = document.createElement("div"); el.className="toast"; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>{ el.remove(); state.toast=null; },2500);
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  render(); // show loading or config
  if (!API_URL) { state.loading=false; render(); return; }
  // Listen for config save
  document.addEventListener("click", async (e) => {
    if (e.target.id === "configSave") {
      const val = document.getElementById("apiInput").value.trim();
      if (val) { API_URL=val; localStorage.setItem("victor_api_url", val); state.loading=true; render(); state.records=await apiLoad(); state.loading=false; render(); }
    }
  });
  state.records = await apiLoad();
  state.loading = false;
  render();
}

// Config save handler (delegated)
document.addEventListener("click", async (e) => {
  if (e.target.id === "configSave") {
    const val = document.getElementById("apiInput")?.value?.trim();
    if (val) { API_URL=val; localStorage.setItem("victor_api_url", val); state.loading=true; render(); state.records=await apiLoad(); state.loading=false; render(); }
  }
});

init();
</script>
</body>
</html>
