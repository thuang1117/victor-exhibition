<style>
/* ─────────────────────── VICTOR CI TOKENS ─────────────────────── */
:root {
  --blue: #0B308E;
  --orange: #EC6C00;
  --navy: #0a1929;
  --blue-bright: #2148b5;
  --blue-light: #e8edf7;
  --white: #ffffff;
  --gray50: #fafafa;
  --gray100: #f5f5f5;
  --gray200: #eeeeee;
  --gray300: #e0e0e0;
  --gray500: #9e9e9e;
  --gray700: #616161;
  --gray900: #212121;
  --red: #d32f2f;
  --green: #2e7d32;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans TC', sans-serif; background:var(--gray50); color:var(--gray900); -webkit-font-smoothing:antialiased; }
button { font-family:inherit; cursor:pointer; }
input { font-family:inherit; }

/* ─────────────────────── BANNER ──────────────────────────────── */
.banner { width:100%; overflow:hidden; }
.banner svg { width:100%; display:block; }

/* ─────────────────────── CARDS ──────────────────────────────── */
.card { background:var(--white); border-radius:20px; margin:16px; box-shadow:0 2px 16px rgba(11,48,142,0.08); overflow:hidden; }
.card-pad { padding:20px; }
.section-label { display:flex; align-items:center; gap:8px; font-size:15px; font-weight:700; color:var(--navy); }
.section-label span:first-child { font-size:18px; }
.divider { height:1px; background:var(--gray200); margin:0 20px; }

/* ─────────────────────── REP SELECT ─────────────────────────── */
.rep-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }
.rep-btn { padding:14px 8px; border:2px solid var(--gray200); border-radius:12px; background:var(--white); font-size:15px; font-weight:500; color:var(--navy); transition:all 0.2s; }
.rep-btn:hover { border-color:var(--blue); background:var(--blue-light); }

/* ─────────────────────── FORM PAGE ──────────────────────────── */
.sticky-header { background:var(--navy); padding:16px 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100; }
.sticky-header h2 { color:var(--white); font-size:17px; font-weight:700; margin:0; }
.sticky-header small { color:rgba(255,255,255,0.6); font-size:12px; }
.back-btn { background:none; border:none; color:var(--white); font-size:22px; padding:4px; }

.summary-bar { background:var(--white); padding:14px 20px; display:flex; justify-content:space-around; border-bottom:2px solid var(--gray200); position:sticky; top:62px; z-index:99; }
.stat-badge { text-align:center; }
.stat-badge .num { font-size:22px; font-weight:900; font-variant-numeric:tabular-nums; }
.stat-badge .label { font-size:11px; color:var(--gray500); margin-top:2px; }

/* ─────────────────────── DEALER CARD ────────────────────────── */
.dealer-card { background:var(--white); border-radius:16px; padding:16px; margin-bottom:12px; border:1px solid var(--gray200); transition:all 0.2s; }
.dealer-card.active { border:2px solid var(--blue-bright); box-shadow:0 2px 12px rgba(11,48,142,0.12); }
.dealer-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.dealer-name { font-size:16px; font-weight:700; color:var(--navy); }
.grade-tag { font-size:11px; padding:2px 8px; border-radius:100px; font-weight:500; display:inline-block; margin-left:8px; }
.grade-concept { background:#e8eaf6; color:#283593; }
.grade-sa { background:#fce4ec; color:#c62828; }
.grade-a { background:#fff3e0; color:#e65100; }
.grade-normal { background:var(--gray100); color:var(--gray700); }
.registered-badge { background:var(--blue-light); color:var(--blue); font-size:12px; font-weight:700; padding:4px 10px; border-radius:100px; }

.num-inputs { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.num-inputs-wide { display:grid; grid-template-columns:1fr; gap:10px; margin-bottom:10px; }
.num-input-label { font-size:12px; color:var(--navy); margin-bottom:3px; text-align:center; font-weight:700; }
.num-input-wrap { display:flex; align-items:center; border:1px solid var(--gray200); border-radius:8px; overflow:hidden; }
.num-input-wrap button { width:32px; height:38px; border:none; background:var(--gray100); font-size:18px; color:var(--gray700); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.num-input-wrap button.plus { color:var(--blue); }
.num-input-wrap .val { flex:1; text-align:center; font-size:16px; font-weight:700; color:var(--navy); width:36px; border:none; background:transparent; outline:none; font-family:inherit; -moz-appearance:textfield; }
.num-input-wrap .val::-webkit-outer-spin-button,
.num-input-wrap .val::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }

.section-divider { height:1px; background:var(--gray200); margin:14px 0; }
.card-columns { display:flex; gap:10px; margin-bottom:10px; }
.meal-section { background:#f0f4ff; border:1px solid #c8d6f0; border-radius:10px; padding:10px; flex:5; min-width:0; }
.meal-section-title { font-size:13px; font-weight:700; color:var(--blue); margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.meal-grid { display:grid; grid-template-columns:1.2fr 1fr 1fr 1fr; gap:6px; }
.shuttle-section { background:#f0faf0; border:1px solid #c0e0c0; border-radius:10px; padding:10px; flex:1.5; min-width:0; display:flex; flex-direction:column; }
.shuttle-section-title { font-size:13px; font-weight:700; color:var(--green); margin-bottom:6px; display:flex; align-items:center; gap:6px; }

.kids-note { font-size:10px; color:var(--gray500); margin-top:6px; text-align:center; }

@media (max-width: 500px) {
  .meal-grid { grid-template-columns:1fr 1fr; gap:6px; }
  .card-columns { flex-direction:column; gap:8px; }
  .shuttle-section { flex:unset; }
  .banner svg { min-height:220px; }
  .banner { font-size:0; } /* prevent inline spacing */
  .banner svg text { transform-origin:center; }
}

/* ─────────────────────── SEARCH & FILTER ────────────────────── */
.search-bar { display:flex; align-items:center; gap:8px; background:var(--white); border:2px solid var(--gray200); border-radius:12px; padding:10px 14px; margin-bottom:10px; transition:border-color .2s; }
.search-bar:focus-within { border-color:var(--blue); }
.search-bar input { flex:1; border:none; outline:none; font-size:14px; font-family:inherit; color:var(--gray900); background:transparent; }
.search-bar input::placeholder { color:var(--gray500); }
.search-icon { font-size:18px; color:var(--gray500); flex-shrink:0; }
.grade-filters { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.grade-filter-btn { padding:6px 12px; border-radius:100px; font-size:12px; font-weight:500; border:1.5px solid var(--gray300); background:var(--white); color:var(--gray700); transition:all .15s; }
.grade-filter-btn.active { color:var(--white); border-color:transparent; }
.grade-filter-btn.g-all.active { background:var(--navy); }
.grade-filter-btn.g-concept.active { background:#283593; }
.grade-filter-btn.g-sa.active { background:#c62828; }
.grade-filter-btn.g-a.active { background:#e65100; }
.grade-filter-btn.g-normal.active { background:var(--gray700); }
.grade-filter-btn.g-done.active { background:#2E7D32; }
.grade-filter-btn.g-notdone.active { background:#d32f2f; }

.warning-box { background:#fff8e1; border:1px solid #ffe082; border-radius:8px; padding:8px 12px; font-size:12px; color:#f57f17; margin-bottom:10px; }
.note-input { width:100%; padding:10px 12px; border:1px solid var(--gray200); border-radius:8px; font-size:13px; color:var(--gray700); outline:none; }
.note-input:focus { border-color:var(--blue); }

/* ─────────────────────── SUBMIT FOOTER ──────────────────────── */
.submit-footer { position:fixed; bottom:0; left:0; right:0; padding:12px 16px; background:var(--white); border-top:1px solid var(--gray200); box-shadow:0 -4px 16px rgba(0,0,0,0.08); }
.submit-btn { width:100%; padding:14px; background:var(--blue); color:var(--white); border:none; border-radius:12px; font-size:16px; font-weight:700; }
.submit-btn:disabled { opacity:0.5; }

/* ─────────────────────── ADMIN ──────────────────────────────── */
.admin-btn { background:var(--white); border:1px solid var(--gray300); color:var(--gray700); padding:12px 32px; border-radius:12px; font-size:14px; box-shadow:0 1px 4px rgba(0,0,0,0.06); transition:all 0.2s; }
.admin-btn:hover { background:var(--blue-light); border-color:var(--blue); }
.admin-total { background:linear-gradient(135deg, var(--blue), var(--navy)); margin:16px; border-radius:20px; padding:20px; color:var(--white); }
.filter-chip { padding:6px 14px; border-radius:100px; font-size:12px; border:1px solid var(--gray300); background:var(--white); color:var(--gray700); transition:all 0.15s; }
.filter-chip.active { background:var(--navy); color:var(--white); border-color:var(--navy); font-weight:600; }
table { width:100%; border-collapse:collapse; font-size:12px; }
th { padding:10px 8px; text-align:center; font-size:12px; font-weight:600; color:var(--gray700); white-space:nowrap; background:var(--gray50); }
td { padding:10px 8px; text-align:center; white-space:nowrap; }

/* ─────────────────────── TOAST ──────────────────────────────── */
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:9999; background:var(--green); color:var(--white); padding:12px 28px; border-radius:12px; font-size:15px; font-weight:500; box-shadow:0 8px 32px rgba(0,0,0,0.2); animation:slideDown 0.3s ease; }
@keyframes slideDown { from { opacity:0; transform:translateX(-50%) translateY(-20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

/* ─────────────────────── LOADING ────────────────────────────── */
.loading-screen { display:flex; align-items:center; justify-content:center; height:100vh; background:var(--blue); color:var(--white); }
.spinner { width:32px; height:32px; border:3px solid rgba(255,255,255,0.2); border-top-color:var(--orange); border-radius:50%; animation:spin 0.8s linear infinite; margin:16px auto 0; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ─────────────────────── CONFIG MODAL ───────────────────────── */
.config-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; }
.config-box { background:var(--white); border-radius:20px; padding:32px 24px; max-width:440px; width:100%; }
.config-input { width:100%; padding:12px; border:2px solid var(--gray200); border-radius:10px; font-size:14px; margin:12px 0; font-family:monospace; }
.config-input:focus { border-color:var(--blue); outline:none; }
.config-save { width:100%; padding:14px; background:var(--blue); color:var(--white); border:none; border-radius:12px; font-size:16px; font-weight:700; margin-top:8px; }
</style>

// ── State ─────────────────────────────────────────────────────
let state = { view:"landing", rep:null, records:{}, loading:true, toast:null, filterRep:"all", searchQuery:"", gradeFilter:"all", statusFilter:"all" };

// ── Google User ──────────────────────────────────────────────
let googleUser = JSON.parse(localStorage.getItem("victor_google_user") || "null");

function decodeJwt(token) {
  try {
    const base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    return JSON.parse(decodeURIComponent(atob(base64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
  } catch(e) { return null; }
}

function handleGoogleLogin(response) {
  const payload = decodeJwt(response.credential);
  if (payload) {
    googleUser = { email: payload.email, name: payload.name, picture: payload.picture };
    localStorage.setItem("victor_google_user", JSON.stringify(googleUser));
    render();
  }
}

function googleLogout() {
  googleUser = null;
  localStorage.removeItem("victor_google_user");
  render();
}

// ── API Helpers ───────────────────────────────────────────────
async function apiLoad() {
  if (!API_URL) return {};
  try {
    const res = await fetch(API_URL + "?action=load");
    const data = await res.json();
    return data.records || {};
  } catch(e) { console.error("Load error:", e); return {}; }
}

async function apiSave(dealer, record) {
  if (!API_URL) return;
  try {
    await fetch(API_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body: JSON.stringify({
        action:"save",
        code: dealer.code,
        name: dealer.name,
        grade: dealer.grade,
        rep: dealer.rep,
        subsidy: SUBSIDY[dealer.grade] || 2,
        adults: record.adults || 0,
        kidA: record.kidA || 0,
        kidB: record.kidB || 0,
        kidC: record.kidC || 0,
        shuttle: record.shuttle || 0,
        note: record.note || "",
        googleEmail: googleUser?.email || "",
        updatedBy: state.rep?.name || ""
      })
    });
  } catch(e) { console.error("Save error:", e); }
}

async function apiReset() {
  if (!API_URL) return;
  try { await fetch(API_URL, { method:"POST", headers:{"Content-Type":"text/plain"}, body:JSON.stringify({action:"reset"}) }); } catch(e) { console.error(e); }
}

// ── Render Engine ─────────────────────────────────────────────
const $ = (sel) => document.querySelector(sel);
const app = () => document.getElementById("app");

function render() {
  if (state.loading) { app().innerHTML = renderLoading(); return; }
  if (!API_URL) { app().innerHTML = renderConfig(); return; }
  switch(state.view) {
    case "landing": app().innerHTML = renderLanding(); bindLanding(); break;
    case "form": app().innerHTML = renderForm(); bindForm(); break;
    case "admin": app().innerHTML = renderAdmin(); bindAdmin(); break;
  }
  if (state.toast) showToastEl(state.toast);
}

  // Apply search, grade & status filter
  const q = state.searchQuery.toLowerCase().trim();
  const gf = state.gradeFilter;
  const sf = state.statusFilter;
  const dealers = allDealers.filter(d => {
    const matchSearch = !q || d.name.toLowerCase().includes(q) || d.code.toLowerCase().includes(q);
    const matchGrade = gf === "all" || d.grade === gf;
    const r = getRec(d.code);
    const hasReg = (r.adults||0) + totalKids(r) > 0;
    const matchStatus = sf === "all" || (sf === "done" && hasReg) || (sf === "notdone" && !hasReg);
    return matchSearch && matchGrade && matchStatus;
  });

  // Grade counts for filter badges
  const gradeCounts = {};
  GRADES.forEach(g => gradeCounts[g] = allDealers.filter(d=>d.grade===g).length);

  // Status counts (based on current grade filter)

  const notdoneCount = gradeFiltered.length - doneCount;

      <div class="stat-badge"><div class="num" id="stat-adults" style="color:var(--orange)">${totals.adults}</div><div class="label">大人</div></div>

    </div>

      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="dealerSearch" placeholder="搜尋店名或代號..." value="${state.searchQuery}">
      </div>
      <div class="grade-filters">
        <button class="grade-filter-btn g-all ${gf==='all'?'active':''}" data-grade="all">全部 ${allDealers.length}</button>
        <button class="grade-filter-btn g-concept ${gf==='概念店'?'active':''}" data-grade="概念店">概念店 ${gradeCounts['概念店']||0}</button>
        <button class="grade-filter-btn g-sa ${gf==='特A級店'?'active':''}" data-grade="特A級店">特A級 ${gradeCounts['特A級店']||0}</button>
        <button class="grade-filter-btn g-a ${gf==='A級店'?'active':''}" data-grade="A級店">A級 ${gradeCounts['A級店']||0}</button>

      <div class="grade-filters">
        <button class="grade-filter-btn g-all ${sf==='all'?'active':''}" data-status="all">全部狀態</button>
        <button class="grade-filter-btn g-done ${sf==='done'?'active':''}" data-status="done">✅ 已登記 ${doneCount}</button>
        <button class="grade-filter-btn g-notdone ${sf==='notdone'?'active':''}" data-status="notdone">⬜ 未登記 ${notdoneCount}</button>

function numInput(code, field, label, val) {
  return `<div><div class="num-input-label">${label}</div><div class="num-input-wrap">
    <button data-code="${code}" data-field="${field}" data-delta="-1">−</button>
    <input type="number" class="val num-direct" data-code="${code}" data-field="${field}" value="${val}" min="0" max="99">
    <button class="plus" data-code="${code}" data-field="${field}" data-delta="1">+</button>
  </div></div>`;
}

// Update summary bar + card totals without full re-render
function updateCardAndSummary(code) {
  const rec = getRec(code);
  const dealer = DEALERS.find(d=>d.code===code);
  if (!dealer) return;
  const sub = SUBSIDY[dealer.grade]||2;
  const kids = totalKids(rec);
  const total = (rec.adults||0) + kids;
  const card = document.getElementById('dc-' + code);

  if (card) {
    // Update meal total
    const mealEl = card.querySelector('[class*="meal-total"]');
    if (mealEl) mealEl.textContent = total;

    // Update card active state + registered badge
    if (total > 0) {
      card.classList.add('active');
      if (!card.querySelector('.registered-badge')) {
        const header = card.querySelector('.dealer-header');
        if (header) {
          const badge = document.createElement('span');
          badge.className = 'registered-badge';
          badge.textContent = '已登記';
          header.appendChild(badge);
        }
      }
    } else {
      card.classList.remove('active');
      const badge = card.querySelector('.registered-badge');
      if (badge) badge.remove();
    }

    // Handle status filter visibility
    if (state.statusFilter === 'done' && total === 0) card.style.display = 'none';
    else if (state.statusFilter === 'notdone' && total > 0) card.style.display = 'none';
    else card.style.display = '';
  }

  // Update warning
  const warnEl = document.getElementById('warn-' + code);
  if (warnEl) {
    if (total > sub) {
      warnEl.style.display = 'block';
      warnEl.innerHTML = '⚠️ 用餐人數超出補助 ' + (total - sub) + ' 人，超出部分需自費';
    } else {
      warnEl.style.display = 'none';
      warnEl.innerHTML = '';
    }
  }

  // Update summary bar
  const myDealers = DEALERS.filter(d=>d.rep===state.rep.name);
  const totals = myDealers.reduce((a,d)=>{ const r=getRec(d.code); const k=totalKids(r); return { adults:a.adults+(r.adults||0), kids:a.kids+k, shuttle:a.shuttle+(r.shuttle||0), reg:a.reg+((r.adults||0)+k>0?1:0) }; }, {adults:0,kids:0,shuttle:0,reg:0});
  const regEl = document.getElementById('stat-reg');
  const adultsEl = document.getElementById('stat-adults');
  const kidsEl = document.getElementById('stat-kids');
  const shuttleEl = document.getElementById('stat-shuttle');
  if (regEl) regEl.innerHTML = totals.reg + '<span style="font-size:13px;font-weight:400;color:var(--gray500)">/' + myDealers.length + '</span>';
  if (adultsEl) adultsEl.textContent = totals.adults;
  if (kidsEl) kidsEl.textContent = totals.kids;
  if (shuttleEl) shuttleEl.textContent = totals.shuttle;

  // Update status filter badge counts (respect current grade filter)
  const gf = state.gradeFilter;
  const gradeFiltered = gf === "all" ? myDealers : myDealers.filter(d=>d.grade===gf);
  const doneCount = gradeFiltered.filter(d=>{ const r=getRec(d.code); return (r.adults||0)+totalKids(r)>0; }).length;
  const notdoneCount = gradeFiltered.length - doneCount;
  const doneBtn = document.querySelector('[data-status="done"]');
  const notdoneBtn = document.querySelector('[data-status="notdone"]');
  if (doneBtn) doneBtn.textContent = '✅ 已登記 ' + doneCount;
  if (notdoneBtn) notdoneBtn.textContent = '⬜ 未登記 ' + notdoneCount;
}

function bindForm() {
  $('#backBtn').onclick = () => { state.searchQuery=""; state.gradeFilter="all"; state.statusFilter="all"; state.view="landing"; render(); };
  $('#refreshBtn').onclick = async () => { state.loading=true; render(); state.records=await apiLoad(); state.loading=false; render(); };
  // Search input (handles Chinese IME composition correctly)
  const searchInput = document.getElementById('dealerSearch');
  if (searchInput) {
    let isComposing = false;
    let searchTimer;
    searchInput.addEventListener('compositionstart', () => { isComposing = true; });
    searchInput.addEventListener('compositionend', () => {
      isComposing = false;
      state.searchQuery = searchInput.value;
      doSearchRender();
    });
    searchInput.oninput = () => {
      if (isComposing) return; // skip during Chinese IME composition
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        state.searchQuery = searchInput.value;
        doSearchRender();
      }, 150);
    };
    function doSearchRender() {
      const val = searchInput.value;
      const pos = searchInput.selectionStart;
      render();
      setTimeout(()=>{
        const si = document.getElementById('dealerSearch');
        if(si){ si.focus(); si.setSelectionRange(pos, pos); }
      }, 0);
    }
  }
  // Grade filter buttons
  document.querySelectorAll('.grade-filter-btn[data-grade]').forEach(btn => {
    btn.onclick = () => { state.gradeFilter = btn.dataset.grade; render(); };
  });
  // Status filter buttons
  document.querySelectorAll('.grade-filter-btn[data-status]').forEach(btn => {
    btn.onclick = () => { state.statusFilter = btn.dataset.status; render(); };
  });
  // +/- buttons
  document.querySelectorAll('.num-input-wrap button').forEach(btn => {
    btn.onclick = () => {
      const {code,field,delta} = btn.dataset;
      if (!delta) return;
      const rec = getRec(code);
      rec[field] = Math.max(0, (rec[field]||0) + Number(delta));
      state.records[code] = rec;
      const inp = btn.parentElement.querySelector('.val');
      if (inp) inp.value = rec[field];
      updateCardAndSummary(code);
      const dealer = DEALERS.find(d=>d.code===code);
      apiSave(dealer, rec);
    };
  });
  // Direct number input
  document.querySelectorAll('.num-direct').forEach(inp => {
    let timer;
    inp.onfocus = () => inp.select();
    inp.oninput = () => {
      clearTimeout(timer);
      const {code,field} = inp.dataset;
      const rec = getRec(code);
      const val = parseInt(inp.value) || 0;
      rec[field] = Math.max(0, Math.min(99, val));
      state.records[code] = rec;
      updateCardAndSummary(code);
      timer = setTimeout(() => {
        const dealer = DEALERS.find(d=>d.code===code);
        apiSave(dealer, rec);
      }, 600);
    };
  });
  // Note input
  document.querySelectorAll('.note-input').forEach(inp => {
    let timer;
    inp.oninput = () => {
      clearTimeout(timer);
      const code = inp.dataset.code;
      const rec = getRec(code);
      rec.note = inp.value;
      state.records[code] = rec;
      timer = setTimeout(() => {
        const dealer = DEALERS.find(d=>d.code===code);
        apiSave(dealer, rec);
      }, 800);
    };
  });
}

function renderAdmin() {
  const repStats = REPS.map(rep => {
    const ds = DEALERS.filter(d=>d.rep===rep.name);
    return ds.reduce((a,d)=>{ const r=getRec(d.code); const kids=totalKids(r); const t=(r.adults||0)+kids; return {...a, adults:a.adults+(r.adults||0), kids:a.kids+kids, kidA:a.kidA+(r.kidA||0), kidB:a.kidB+(r.kidB||0), kidC:a.kidC+(r.kidC||0), shuttle:a.shuttle+(r.shuttle||0), reg:a.reg+(t>0?1:0), meal:a.meal+t }; }, {name:rep.name, adults:0, kids:0, kidA:0, kidB:0, kidC:0, shuttle:0, reg:0, meal:0, total:ds.length});
  });
  const grand = repStats.reduce((a,s)=>({meal:a.meal+s.meal, adults:a.adults+s.adults, kids:a.kids+s.kids, kidA:a.kidA+s.kidA, kidB:a.kidB+s.kidB, kidC:a.kidC+s.kidC, shuttle:a.shuttle+s.shuttle, reg:a.reg+s.reg, dealers:a.dealers+s.total}), {meal:0,adults:0,kids:0,kidA:0,kidB:0,kidC:0,shuttle:0,reg:0,dealers:0});

  // Bar chart data (7 reps + total)
  const chartData = [...repStats.map(s=>({label:s.name.slice(0,1), fullName:s.name, reg:s.reg, total:s.total, pct:s.total>0?Math.round(s.reg/s.total*100):0})),
    {label:"全", fullName:"總計", reg:grand.reg, total:grand.dealers, pct:grand.dealers>0?Math.round(grand.reg/grand.dealers*100):0}];

  const filtered = (state.filterRep==="all"?DEALERS:DEALERS.filter(d=>d.rep===state.filterRep)).sort((a,b)=>GRADES.indexOf(a.grade)-GRADES.indexOf(b.grade)||a.code.localeCompare(b.code));

  return `<div style="min-height:100vh;background:var(--gray50)">
    <div class="sticky-header" style="justify-content:space-between">
      <div style="display:flex;align-items:center;gap:12px"><button class="back-btn" id="backBtn">←</button><div><h2>管理後台</h2><small>${EVENT.season} 展示會</small></div></div>
      <div style="display:flex;gap:8px">
        <button id="refreshAdmin" style="background:var(--blue-bright);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px">🔄</button>
        <button id="exportBtn" style="background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500">📥 匯出</button>
      </div>
    </div>

    <!-- ═══ 總覽 ═══ -->
    <div class="admin-total">
      <div style="font-size:13px;opacity:.7;margin-bottom:12px">全部登記總覽</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;text-align:center">
        <div style="background:rgba(255,255,255,.1);border-radius:12px;padding:16px">
          <div style="font-size:36px;font-weight:900">${grand.meal}</div>
          <div style="font-size:12px;opacity:.7;margin-top:4px">🍽️ 用餐總人數</div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.15)">
            <div><div style="font-size:15px;font-weight:700">${grand.adults}</div><div style="font-size:9px;opacity:.5">大人</div></div>
            <div><div style="font-size:15px;font-weight:700">${grand.kidA}</div><div style="font-size:9px;opacity:.5">80↓</div></div>
            <div><div style="font-size:15px;font-weight:700">${grand.kidB}</div><div style="font-size:9px;opacity:.5">80-100</div></div>
            <div><div style="font-size:15px;font-weight:700">${grand.kidC}</div><div style="font-size:9px;opacity:.5">100-140</div></div>
          </div>
        </div>
        <div style="background:rgba(255,255,255,.1);border-radius:12px;padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <div style="font-size:36px;font-weight:900">${grand.shuttle}</div>
          <div style="font-size:12px;opacity:.7;margin-top:4px">🚌 接駁車總人數</div>
        </div>
      </div>
      <div style="margin-top:12px;font-size:12px;opacity:.6;text-align:center">已登記 ${grand.reg}/${grand.dealers} 家（${grand.dealers>0?Math.round(grand.reg/grand.dealers*100):0}%）</div>
    </div>

    <!-- ═══ 達標率柱狀圖 ═══ -->
    <div class="card"><div style="padding:16px">
      <div style="font-weight:700;color:var(--navy);font-size:15px;margin-bottom:16px">📊 各業務登記達標率</div>
      <div style="display:flex;align-items:flex-end;gap:6px;height:220px;padding-bottom:34px;position:relative">
        ${chartData.map((d,i)=>{
          const isTotal = i === chartData.length-1;
          const barColor = isTotal ? 'var(--orange)' : 'var(--blue)';
          const barH = 130;
          const fillH = d.total > 0 ? Math.round((d.reg / d.total) * barH) : 0;
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;position:relative">
            <div style="font-size:11px;font-weight:700;color:${d.pct>=80?'var(--green)':d.pct>=50?'var(--orange)':'var(--red)'};margin-bottom:4px">${d.pct}%</div>
            <div style="width:100%;max-width:40px;position:relative;height:${barH}px;background:var(--gray200);border-radius:4px;overflow:hidden">
              <div style="position:absolute;bottom:0;width:100%;height:${fillH}px;background:${barColor};border-radius:4px;transition:height .3s"></div>
            </div>
            <div style="font-size:10px;color:var(--gray700);margin-top:6px;font-weight:${isTotal?700:400}">${d.fullName.slice(0,3)}</div>
            <div style="font-size:9px;color:var(--gray500)">${d.reg}/${d.total}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:16px;justify-content:center;margin-top:8px;font-size:11px;color:var(--gray500)">
        <span>🟩 ≥80%</span><span>🟧 ≥50%</span><span>🟥 <50%</span>
      </div>
    </div></div>

    <!-- ═══ 已登記店家占比圓餅圖 ═══ -->
    <div class="card"><div style="padding:16px">
      <div style="font-weight:700;color:var(--navy);font-size:15px;margin-bottom:16px">🥧 已登記店家數量占比</div>
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center">
        <svg viewBox="0 0 200 200" width="180" height="180">
          ${(()=>{
            const pieColors = ['#0B308E','#EC6C00','#2E7D32','#6A1B9A','#C62828','#00838F','#F57F17','#455A64'];
            const pieData = repStats.filter(s=>s.reg>0);
            const totalReg = grand.reg || 1;
            let cumAngle = 0;
            if (pieData.length === 0) return '<circle cx="100" cy="100" r="80" fill="var(--gray200)"/><text x="100" y="105" text-anchor="middle" font-size="14" fill="var(--gray500)">尚無登記</text>';
            return pieData.map((s,i)=>{
              const pct = s.reg / totalReg;
              const startAngle = cumAngle;
              cumAngle += pct * 360;
              const endAngle = cumAngle;
              const start = polarToCartesian(100, 100, 80, startAngle);
              const end = polarToCartesian(100, 100, 80, endAngle);
              const large = pct > 0.5 ? 1 : 0;
              const color = pieColors[i % pieColors.length];
              if (pieData.length === 1) return '<circle cx="100" cy="100" r="80" fill="'+color+'"/>';
              return '<path d="M100,100 L'+start.x+','+start.y+' A80,80 0 '+large+',1 '+end.x+','+end.y+' Z" fill="'+color+'"/>';
            }).join('');
          })()}
        </svg>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${(()=>{
            const pieColors = ['#0B308E','#EC6C00','#2E7D32','#6A1B9A','#C62828','#00838F','#F57F17','#455A64'];
            return repStats.map((s,i)=>{
              const pct = grand.reg > 0 ? Math.round(s.reg / grand.reg * 100) : 0;
              return '<div style="display:flex;align-items:center;gap:8px;font-size:12px"><div style="width:12px;height:12px;border-radius:2px;background:'+pieColors[i%pieColors.length]+';flex-shrink:0"></div><span style="color:var(--gray700)">'+s.name+'</span><span style="font-weight:700;color:var(--navy)">'+s.reg+'家</span><span style="color:var(--gray500)">('+pct+'%)</span></div>';
            }).join('');
          })()}
        </div>
      </div>
    </div></div>

    <!-- ═══ 各業務統計 ═══ -->
    <div class="card"><div style="padding:14px 16px;border-bottom:1px solid var(--gray200)"><span style="font-weight:700;color:var(--navy);font-size:15px">各業務統計</span></div>
    <div style="overflow-x:auto"><table><thead><tr>
      <th>業務</th><th>登記</th>
      <th style="background:#E8F5E9;color:#2E7D32">用餐合計</th>
      <th>大人</th><th style="font-size:10px">80↓</th><th style="font-size:10px">80-100</th><th style="font-size:10px">100-140</th>
      <th style="background:#F3E5F5;color:#6A1B9A">接駁車</th>
    </tr></thead><tbody>
    ${repStats.map(s=>`<tr style="border-bottom:1px solid var(--gray100)">
      <td style="font-weight:600">${s.name}</td>
      <td>${s.reg}/${s.total}</td>
      <td style="font-weight:700;background:#E8F5E9;color:#2E7D32">${s.meal}</td>
      <td>${s.adults}</td><td>${s.kidA}</td><td>${s.kidB}</td><td>${s.kidC}</td>
      <td style="font-weight:700;background:#F3E5F5;color:#6A1B9A">${s.shuttle}</td>
    </tr>`).join('')}
    <tr style="border-top:2px solid var(--gray300);font-weight:700">
      <td>合計</td>
      <td>${grand.reg}/${grand.dealers}</td>
      <td style="background:#C8E6C9;color:#1B5E20">${grand.meal}</td>
      <td>${grand.adults}</td><td>${grand.kidA}</td><td>${grand.kidB}</td><td>${grand.kidC}</td>
      <td style="background:#E1BEE7;color:#4A148C">${grand.shuttle}</td>
    </tr>
    </tbody></table></div></div>

    <!-- ═══ 篩選 ═══ -->
    <div style="margin:0 16px 12px;display:flex;gap:6px;flex-wrap:wrap">
      <button class="filter-chip ${state.filterRep==='all'?'active':''}" data-filter="all">全部</button>
      ${REPS.map(r=>`<button class="filter-chip ${state.filterRep===r.name?'active':''}" data-filter="${r.name}">${r.name}</button>`).join('')}
    </div>

    <!-- ═══ 明細表 ═══ -->
    <div class="card" style="margin-bottom:40px"><div style="overflow-x:auto"><table><thead><tr>
      <th>編號</th><th>客戶</th><th>級別</th><th>業務</th><th>補助</th>
      <th style="background:#E8F5E9;color:#2E7D32">用餐</th>
      <th>大人</th><th style="font-size:10px">80↓</th><th style="font-size:10px">80-100</th><th style="font-size:10px">100-140</th>
      <th style="background:#F3E5F5;color:#6A1B9A">接駁</th><th>備註</th>
    </tr></thead><tbody>
    ${filtered.map(d=>{ const r=getRec(d.code); const kids=totalKids(r); const t=(r.adults||0)+kids; const sub=SUBSIDY[d.grade]||2; const over=t>sub;
      return `<tr style="border-bottom:1px solid var(--gray100);background:${t>0?'#f8fbff':'transparent'}">
        <td style="font-size:11px">${d.code}</td><td style="font-weight:${t>0?600:400}">${d.name}</td><td style="font-size:11px">${d.grade}</td><td style="font-size:11px">${d.rep}</td><td>${sub}</td>
        <td style="font-weight:700;background:${t>0?'#E8F5E9':'transparent'};color:${t>0?'#2E7D32':'var(--gray300)'}">${t}</td>
        <td style="font-weight:700;color:${(r.adults||0)>0?'var(--blue)':'var(--gray300)'}">${r.adults||0}</td>
        <td style="color:${(r.kidA||0)>0?'var(--orange)':'var(--gray300)'}">${r.kidA||0}</td>
        <td style="color:${(r.kidB||0)>0?'var(--orange)':'var(--gray300)'}">${r.kidB||0}</td>
        <td style="color:${(r.kidC||0)>0?'var(--orange)':'var(--gray300)'}">${r.kidC||0}</td>
        <td style="font-weight:700;background:${(r.shuttle||0)>0?'#F3E5F5':'transparent'};color:${(r.shuttle||0)>0?'#6A1B9A':'var(--gray300)'}">${r.shuttle||0}</td>
        <td style="font-size:11px;color:${over?'var(--red)':'var(--gray500)'}; max-width:100px;overflow:hidden;text-overflow:ellipsis">${over?'⚠️超額 ':''}${r.note||''}</td></tr>`;
    }).join('')}
    </tbody></table></div></div>
  </div>`;
}

function bindAdmin() {
  $('#backBtn').onclick = () => { state.view="landing"; render(); };
  $('#refreshAdmin').onclick = async () => { state.loading=true; render(); state.records=await apiLoad(); state.loading=false; state.view="admin"; render(); };
  $('#exportBtn').onclick = exportXLSX;
  document.querySelectorAll('.filter-chip').forEach(c => {
    c.onclick = () => { state.filterRep = c.dataset.filter; render(); };
  });
}

function exportXLSX() {
  // Build data rows matching admin detail table: 編號/客戶/級別/業務/補助/用餐合計/大人/80↓/80-100/100-140/接駁車/備註
  const headers = ["客戶編號","客戶簡稱","店級別","業務姓名","補助人數","用餐合計","大人","小孩80cm↓","小孩80-100cm","小孩100-140cm","接駁車人數","備註"];
  const data = [headers];

  DEALERS.forEach(d => {
    const r = getRec(d.code);
    const sub = SUBSIDY[d.grade] || 2;
    const kids = totalKids(r);
    const meal = (r.adults||0) + kids;
    data.push([d.code, d.name, d.grade, d.rep, sub, meal, r.adults||0, r.kidA||0, r.kidB||0, r.kidC||0, r.shuttle||0, r.note||""]);
  });

  // Create workbook & worksheet
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(data);

  // Column widths
  ws['!cols'] = [
    {wch:10},{wch:14},{wch:8},{wch:10},{wch:8},
    {wch:10},{wch:8},{wch:12},{wch:14},{wch:14},{wch:12},{wch:20}
  ];

  // Style helpers
  const greenFill = {fgColor:{rgb:"E8F5E9"}};
  const greenFillDark = {fgColor:{rgb:"C8E6C9"}};
  const purpleFill = {fgColor:{rgb:"F3E5F5"}};
  const purpleFillDark = {fgColor:{rgb:"E1BEE7"}};
  const headerFill = {fgColor:{rgb:"0B308E"}};
  const headerFont = {color:{rgb:"FFFFFF"}, bold:true, sz:11};
  const greenFont = {color:{rgb:"2E7D32"}, bold:true};
  const purpleFont = {color:{rgb:"6A1B9A"}, bold:true};
  const boldStyle = {bold:true};
  const centerAlign = {horizontal:"center"};

  // Apply header styles
  for (let c = 0; c < headers.length; c++) {
    const ref = XLSX.utils.encode_cell({r:0, c:c});
    if (!ws[ref]) continue;
    ws[ref].s = {
      fill: (c === 5) ? {fgColor:{rgb:"2E7D32"}} : (c === 10) ? {fgColor:{rgb:"6A1B9A"}} : headerFill,
      font: headerFont,
      alignment: centerAlign
    };
  }

  // Apply data row styles (col 5=用餐合計 green, col 10=接駁車 purple)
  for (let r = 1; r < data.length; r++) {
    for (let c = 0; c < headers.length; c++) {
      const ref = XLSX.utils.encode_cell({r:r, c:c});
      if (!ws[ref]) ws[ref] = {v: data[r][c], t: typeof data[r][c] === 'number' ? 'n' : 's'};
      if (c === 5) {
        ws[ref].s = { fill: greenFill, font: greenFont, alignment: centerAlign };
      } else if (c === 10) {
        ws[ref].s = { fill: purpleFill, font: purpleFont, alignment: centerAlign };
      } else if (c <= 4 || (c >= 6 && c <= 9)) {
        ws[ref].s = { alignment: centerAlign };
      }
    }
  }

  // Add totals row
  const totalRow = data.length;
  const repStatsForExport = REPS.map(rep => {
    const ds = DEALERS.filter(d=>d.rep===rep.name);
    return ds.reduce((a,d)=>{ const r=getRec(d.code); const kids=totalKids(r); return {...a, adults:a.adults+(r.adults||0), kidA:a.kidA+(r.kidA||0), kidB:a.kidB+(r.kidB||0), kidC:a.kidC+(r.kidC||0), shuttle:a.shuttle+(r.shuttle||0), meal:a.meal+(r.adults||0)+kids }; }, {adults:0,kidA:0,kidB:0,kidC:0,shuttle:0,meal:0});
  });
  const grandExport = repStatsForExport.reduce((a,s)=>({meal:a.meal+s.meal, adults:a.adults+s.adults, kidA:a.kidA+s.kidA, kidB:a.kidB+s.kidB, kidC:a.kidC+s.kidC, shuttle:a.shuttle+s.shuttle}), {meal:0,adults:0,kidA:0,kidB:0,kidC:0,shuttle:0});

  const totalData = ["合計","","","","", grandExport.meal, grandExport.adults, grandExport.kidA, grandExport.kidB, grandExport.kidC, grandExport.shuttle, ""];
  XLSX.utils.sheet_add_aoa(ws, [totalData], {origin: totalRow});

  // Style totals row
  for (let c = 0; c < totalData.length; c++) {
    const ref = XLSX.utils.encode_cell({r:totalRow, c:c});
    if (!ws[ref]) ws[ref] = {v: totalData[c], t: typeof totalData[c] === 'number' ? 'n' : 's'};
    const base = { font: boldStyle, alignment: centerAlign };
    if (c === 5) {
      ws[ref].s = { fill: greenFillDark, font: {...boldStyle, ...greenFont}, alignment: centerAlign };
    } else if (c === 10) {
      ws[ref].s = { fill: purpleFillDark, font: {...boldStyle, ...purpleFont}, alignment: centerAlign };
    } else if (c === 0) {
      ws[ref].s = { font: boldStyle };
    } else {
      ws[ref].s = base;
    }
  }

  // Update range
  ws['!ref'] = XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:totalRow, c:headers.length-1}});

  XLSX.utils.book_append_sheet(wb, ws, "展示會登記");
  XLSX.writeFile(wb, "VICTOR_" + EVENT.season + "_展示會登記_" + new Date().toISOString().slice(0,10) + ".xlsx");
}

// ── Helpers ───────────────────────────────────────────────────
function getRec(code) { return state.records[code] || {adults:0,kidA:0,kidB:0,kidC:0,shuttle:0,note:""}; }
function totalKids(r) { return (r.kidA||0)+(r.kidB||0)+(r.kidC||0); }
function polarToCartesian(cx, cy, r, angleDeg) {
  const rad = (angleDeg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function showToastEl(msg) {
  const el = document.createElement("div"); el.className="toast"; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>{ el.remove(); state.toast=null; },2500);
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  render(); // show loading or config
  if (!API_URL) { state.loading=false; render(); return; }
  // Listen for config save
  document.addEventListener("click", async (e) => {
    if (e.target.id === "configSave") {
      const val = document.getElementById("apiInput").value.trim();
      if (val) { API_URL=val; localStorage.setItem("victor_api_url", val); state.loading=true; render(); state.records=await apiLoad(); state.loading=false; render(); }
    }
  });
  state.records = await apiLoad();
  state.loading = false;
  render();
}

// Config save handler (delegated)
document.addEventListener("click", async (e) => {
  if (e.target.id === "configSave") {
    const val = document.getElementById("apiInput")?.value?.trim();
    if (val) { API_URL=val; localStorage.setItem("victor_api_url", val); state.loading=true; render(); state.records=await apiLoad(); state.loading=false; render(); }
  }
});

init();
</script>
